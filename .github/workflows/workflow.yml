name: CI/CD

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14.4"

      - uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --extra dev
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Security & lint
        run: uv tool run pre-commit run --all-files

      - name: Test
        run: uv run pytest

  deploy:
    name: Deploy
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14.4"

      - uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --extra dev
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          npm install
          cd website && npm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy infrastructure
        run: npx cdk deploy --require-approval never --outputs-file cdk-outputs.json

      - name: Build website
        run: |
          API_URL=$(node -e "const d=require('./cdk-outputs.json'); console.log(Object.values(d)[0].ApiUrl)")
          echo "PUBLIC_API_URL=${API_URL}" > website/.env
          cd website && npm run build

      - name: Deploy website assets
        run: |
          npx cdk deploy --require-approval never
          rm -f cdk-outputs.json
