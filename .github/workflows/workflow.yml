name: Deploy Website

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14.4"

      - uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"

      - uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        run: |
          uv sync --extra dev
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Install Node dependencies
        run: |
          npm install
          cd website && npm install

      - name: Install pre-commit
        run: uv tool install pre-commit

      - name: Security scan
        run: |
          pre-commit run bandit --all-files
          pre-commit run detect-secrets --all-files
          pre-commit run detect-private-key --all-files
          pre-commit run detect-aws-credentials --all-files

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test
        run: uv run pytest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get API URL from existing stack
        id: api
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name prod-engebreth-website \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text 2>/dev/null || echo "")
          echo "url=${API_URL}" >> "$GITHUB_OUTPUT"

      - name: Build website
        run: |
          if [ -n "${{ steps.api.outputs.url }}" ]; then
            echo "PUBLIC_API_URL=${{ steps.api.outputs.url }}" > website/.env
          fi
          cd website && npm run build

      - name: Deploy
        run: npx cdk deploy --require-approval never
