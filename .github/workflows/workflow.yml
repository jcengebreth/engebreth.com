name: CI/CD

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14.4"

      - uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --extra dev
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Biome
        run: npx biome check lib/ bin/ test/

      - name: Security & lint
        run: uv tool run pre-commit run --all-files

      - name: Test
        run: uv run pytest

      - name: CDK tests
        run: npm test

  deploy:
    name: Deploy
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14.4"

      - uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --extra dev
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          npm install
          cd website && npm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build website
        # Fetches API URL from the existing stack. Empty on first deploy —
        # visitor counter won't work until the second push after initial setup.
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name prod-engebreth-website \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text 2>/dev/null || echo "")
          if [ -n "${API_URL}" ]; then
            echo "PUBLIC_API_URL=${API_URL}" > website/.env
          fi
          cd website && npm run build

      - name: Deploy
        run: npx cdk deploy --require-approval never
